name: DLMM Hot Pools Scan

on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes - public repo, so Actions minutes are free regardless of cadence
  workflow_dispatch:

concurrency:
  group: dlmm-scan-state
  cancel-in-progress: false # never cancel mid-run - state.json commits must not race each other

jobs:
  scan:
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to commit state.json back to the repo

    steps:
      - uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan for DLMM printer pools
        run: npm run dlmm:scan
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_DEGEN: ${{ secrets.SLACK_WEBHOOK_DEGEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Sync to KV
        run: node scripts/syncToKv.mjs --dlmm-only
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}

      - name: Commit scanner state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: scanner state [skip ci]"
            git pull --rebase origin main
            git push
          fi
