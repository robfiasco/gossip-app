name: DLMM Hot Pools Scan

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes - public repo, so Actions minutes are free regardless of cadence
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan for DLMM printer pools
        run: npm run dlmm:scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Sync to KV
        run: node scripts/syncToKv.mjs --dlmm-only
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}

      # No git commit step here (unlike onchain-story.yml / daily-content.yml) -
      # committing every 10 minutes would flood the repo history. KV is the
      # source of truth for this one; data/dlmm_printers.json in the runner is
      # scratch output, not checked in.
